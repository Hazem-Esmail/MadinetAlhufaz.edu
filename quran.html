*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;overflow-x:clip}
:root{--gold:#C9A24B;--gold-d:#9F7A28;--gold-l:#E6C97B;--gold-soft:#F6EDD4;--teal:#119FBF;--teal-d:#0B7E99;--teal-soft:#E2F6FB;--ink:#0C2A33;--ink2:#103C49;--paper:#FBF6EC;--paper2:#F4E9D3;--line:#E7D8B6;--tx:#1d2b30;--tx2:#5b6b70;--head:#16505F;--ease:cubic-bezier(.22,.61,.36,1);--g1:rgba(201,162,75,.55);--g2:rgba(17,159,191,.45);--g3:rgba(230,201,123,.45)}
html.dark{--paper:#08191f;--paper2:#0d2730;--line:#1d4450;--tx:#e2edef;--tx2:#9fb6bd;--head:#E6C97B;--gold-soft:rgba(201,162,75,.14);--teal-soft:rgba(17,159,191,.14)}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--paper);color:var(--tx);line-height:1.8;min-height:100vh;overflow-x:clip;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}::selection{background:var(--gold-soft)}
.bg-glows{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.bg-glows .g{position:absolute;border-radius:50%;filter:blur(74px);opacity:.4;will-change:transform}
.bg-glows .g1{width:46vw;height:46vw;background:radial-gradient(circle,var(--g1),transparent 68%);top:-9%;inset-inline-start:-6%;animation:gA 30s ease-in-out infinite}
.bg-glows .g2{width:42vw;height:42vw;background:radial-gradient(circle,var(--g2),transparent 68%);bottom:-12%;inset-inline-end:-8%;animation:gB 36s ease-in-out infinite}
.bg-glows .g3{width:34vw;height:34vw;background:radial-gradient(circle,var(--g3),transparent 70%);top:40%;inset-inline-start:44%;animation:gC 42s ease-in-out infinite}
@keyframes gA{0%,100%{transform:translate(0,0)}50%{transform:translate(6vw,7vh)}}
@keyframes gB{0%,100%{transform:translate(0,0)}50%{transform:translate(-7vw,-5vh)}}
@keyframes gC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vw,4vh) scale(1.12)}}
html.dark .bg-glows .g{opacity:.28}
/* frosted glass nav (always visible) */
#nav{position:sticky;top:0;z-index:300;background:rgba(251,246,236,.9);-webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid rgba(201,162,75,.22);box-shadow:0 6px 26px -18px rgba(12,42,51,.55)}
html.dark #nav{background:rgba(8,25,31,.9)}
#nav::before{content:"";position:absolute;inset:0 0 auto 0;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.32),transparent);pointer-events:none}
html.dark #nav::before{background:linear-gradient(180deg,rgba(255,255,255,.06),transparent)}
#nav::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,75,.55),transparent);pointer-events:none}
.nav-in{max-width:1180px;margin:0 auto;padding:9px 18px;display:flex;align-items:center;gap:12px;position:relative}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand img{width:46px;height:46px;border-radius:50%;box-shadow:0 4px 12px -5px rgba(159,122,40,.6);flex-shrink:0}
.brand-txt{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.brand .b1{font-family:'Reem Kufi',serif;font-weight:700;font-size:15.5px;color:var(--ink);white-space:nowrap}
.brand .b2{font-size:11px;color:var(--gold-d);font-weight:600;white-space:nowrap}
html.dark .brand .b1{color:var(--head)}
.nav-links{margin-inline-start:auto;display:flex;align-items:center;gap:6px}
.nav-links a{padding:8px 14px;border-radius:30px;font-weight:700;font-size:14px;color:var(--tx2);transition:.25s}
.nav-links a:hover{color:var(--ink);background:var(--gold-soft)}
html.dark .nav-links a:hover{color:var(--head)}
.nav-links a.active{color:#fff;background:linear-gradient(135deg,var(--gold),var(--gold-d));box-shadow:0 8px 18px -10px rgba(159,122,40,.9)}
.theme-btn{width:40px;height:40px;border:1px solid var(--line);background:transparent;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:var(--tx2);transition:.25s;flex-shrink:0}
.theme-btn:hover{color:var(--gold-d);border-color:var(--gold)}.theme-btn svg{width:19px;height:19px}
.nav-toggle{display:none;margin-inline-start:auto;width:42px;height:42px;border:1px solid var(--line);background:transparent;border-radius:12px;cursor:pointer;color:var(--tx2);flex-direction:column;gap:4px;align-items:center;justify-content:center;flex-shrink:0}
.nav-toggle span{display:block;width:18px;height:2px;background:currentColor;border-radius:2px;transition:.3s}
.nav-toggle.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.nav-toggle.open span:nth-child(2){opacity:0}
.nav-toggle.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
@media(max-width:820px){.nav-toggle{display:flex}
.nav-links{position:fixed;inset:64px 0 auto 0;flex-direction:column;align-items:stretch;gap:4px;padding:14px 18px 20px;background:rgba(251,246,236,.98);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);transform:translateY(-12px);opacity:0;pointer-events:none;transition:.3s var(--ease);margin:0}
html.dark .nav-links{background:rgba(8,25,31,.99)}
.nav-links.open{transform:none;opacity:1;pointer-events:auto}
.nav-links a{padding:13px 14px}.nav-links .theme-btn{align-self:flex-start;margin-top:6px}}
@media(max-width:480px){.brand .b2{display:none}.brand img{width:40px;height:40px}.brand .b1{font-size:13.5px;white-space:normal}}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px;width:100%}
.page-head{text-align:center;padding:40px 0 6px}
.eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--gold-d);background:var(--gold-soft);border:1px solid var(--gold-l);padding:6px 16px;border-radius:30px}
html.dark .eyebrow{color:var(--gold-l)}
.page-head h1{font-family:'Reem Kufi',serif;font-size:clamp(27px,5vw,38px);color:var(--ink);margin-top:13px;line-height:1.3}
html.dark .page-head h1{color:var(--head)}
.ph-sub{color:var(--tx2);margin-top:8px;font-size:14px;max-width:600px;margin-inline:auto}
.card{background:rgba(255,255,255,.5);-webkit-backdrop-filter:blur(12px) saturate(1.25);backdrop-filter:blur(12px) saturate(1.25);border:1px solid rgba(231,216,182,.8);border-radius:18px}
html.dark .card{background:rgba(14,39,48,.5)}
footer.ft{margin-top:56px;padding:28px 18px;text-align:center;color:var(--tx2);font-size:13px;border-top:1px solid var(--line)}
footer.ft a{color:var(--gold-d);font-weight:700}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 22px;border-radius:30px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;z-index:600;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%)}
@media(max-width:760px){.bg-glows .g{filter:blur(52px);opacity:.34}.bg-glows .g3{display:none}}
@media(prefers-reduced-motion:reduce){.bg-glows .g{animation:none}*{scroll-behavior:auto!important}}

.qv{padding-bottom:30px}
.qv-bar{position:fixed;top:70px;left:14px;right:14px;margin:0 auto;max-width:1150px;z-index:200;display:flex;flex-wrap:wrap;gap:9px;align-items:center;justify-content:center;padding:11px 12px;border-radius:16px;background:rgba(251,246,236,.95);-webkit-backdrop-filter:blur(16px) saturate(1.5);backdrop-filter:blur(16px) saturate(1.5);border:1px solid var(--line);box-shadow:0 10px 30px -20px rgba(12,42,51,.5)}
html.dark .qv-bar{background:rgba(8,25,31,.95)}
.rw-switch{display:inline-flex;background:var(--paper2);border-radius:30px;padding:4px;gap:2px}
.rw-switch button{padding:7px 15px;border:none;background:transparent;cursor:pointer;font-family:'Reem Kufi',serif;font-weight:700;font-size:14px;color:var(--tx2);border-radius:30px;transition:.25s}
.rw-switch button.on{color:#fff;background:linear-gradient(135deg,var(--teal),var(--teal-d));box-shadow:0 8px 18px -10px rgba(11,126,153,.9)}
.qv-bar select{padding:9px 12px;border-radius:11px;border:1px solid var(--line);background:var(--paper);color:var(--tx);font-family:inherit;font-size:13px;max-width:150px}
.qv-bar select:focus{outline:none;border-color:var(--gold)}
.pg-jump{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:11px;padding:3px 9px}
.pg-jump label{font-size:12px;color:var(--tx2)}
.pg-jump input{width:50px;padding:6px;border:none;background:transparent;color:var(--tx);font-family:inherit;font-weight:700;text-align:center}
.pg-jump input:focus{outline:none}
.pg-jump button{width:30px;height:30px;border:none;border-radius:8px;background:var(--gold-soft);color:var(--gold-d);cursor:pointer;font-weight:800}
.fs{display:flex;border:1px solid var(--line);border-radius:30px;overflow:hidden}
.fs button{padding:8px 12px;border:none;background:transparent;cursor:pointer;color:var(--tx2);font-weight:800;font-size:13px}
.fs button:hover{background:var(--gold-soft);color:var(--gold-d)}
.tgl{padding:9px 14px;border-radius:30px;border:1px solid var(--line);background:transparent;cursor:pointer;font-family:inherit;font-weight:800;font-size:13px;color:var(--tx2);transition:.2s}
.tgl.on{color:#fff;background:linear-gradient(135deg,var(--gold),var(--gold-d));border-color:transparent}
.listen{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:30px;border:none;cursor:pointer;font-weight:800;font-size:13px;color:#fff;background:linear-gradient(135deg,var(--teal),var(--teal-d));box-shadow:0 8px 18px -10px rgba(11,126,153,.9)}
.listen svg{width:14px;height:14px}
.tj-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:8px auto 0;font-size:12px;color:var(--tx2)}
.tj-legend span{display:inline-flex;align-items:center;gap:5px}
.tj-legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
.tj-m{color:#0B7E99}.tj-g{color:#7c4dbb}.tj-q{color:#c0532f}
.page-card{position:relative;max-width:800px;margin:14px auto 0;padding:32px clamp(16px,5vw,50px) 24px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.66),rgba(251,246,236,.5));-webkit-backdrop-filter:blur(13px);backdrop-filter:blur(13px);border:1px solid var(--gold-l);box-shadow:0 30px 70px -34px rgba(12,42,51,.5),inset 0 0 0 6px rgba(201,162,75,.12)}
html.dark .mushaf{color:var(--tx)}html.dark .page-card{background:linear-gradient(180deg,rgba(14,39,48,.7),rgba(8,25,31,.55))}
.page-card::before,.page-card::after{content:"";position:absolute;width:26px;height:26px;border:2px solid var(--gold);opacity:.55}
.page-card::before{top:12px;inset-inline-start:12px;border-inline-end:none;border-block-end:none;border-radius:8px 0 0 0}
.page-card::after{bottom:12px;inset-inline-end:12px;border-inline-start:none;border-block-start:none;border-radius:0 0 8px 0}
.surah-band{display:flex;flex-direction:column;align-items:center;gap:3px;margin:14px 0 6px;padding:12px 20px;border-radius:14px;background:linear-gradient(135deg,var(--ink),var(--ink2));color:#fff}
.surah-band h2{font-family:'Reem Kufi',serif;font-size:23px;color:var(--gold-l)}
.surah-band .sb-meta{font-size:11.5px;color:rgba(255,255,255,.72)}
.surah-band.cont{background:transparent;color:var(--gold-d)}.surah-band.cont h2{font-size:15px}
.bismillah{text-align:center;font-family:'AmiriQuranEmbed','Amiri Quran','Amiri',serif;font-size:calc(1.5rem*var(--qfs,1));color:var(--gold-d);margin:14px 0 10px;line-height:2}
html.dark .bismillah{color:var(--gold-l)}
.mushaf{font-family:'AmiriQuranEmbed','Amiri Quran','Amiri',serif;font-size:calc(1.6rem*var(--qfs,1));line-height:2.55;text-align:center;color:#1f1608;margin-bottom:8px;text-rendering:optimizeLegibility;-webkit-font-feature-settings:'liga' 1,'calt' 1;font-feature-settings:'liga' 1,'calt' 1}
.ayah{cursor:pointer;border-radius:7px;padding:1px 3px;transition:background .25s;-webkit-tap-highlight-color:transparent}
.ayah:hover{background:var(--gold-soft)}.ayah.play{background:rgba(17,159,191,.2)}.ayah.sel{background:var(--gold-soft);box-shadow:0 0 0 1px var(--gold-l)}
.ayam{font-family:'AmiriQuranEmbed','Amiri Quran',serif;color:var(--gold-d);font-size:.62em;margin:0 .06em;white-space:nowrap;line-height:1}html.dark .ayam{color:var(--gold-l)}
.pc-foot{text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;color:var(--tx2);font-weight:700}
.pg-nav{display:flex;align-items:center;justify-content:center;gap:14px;max-width:800px;margin:18px auto 0}
.pg-nav button{flex:1;max-width:200px;padding:13px;border-radius:14px;border:1px solid var(--line);background:var(--paper);cursor:pointer;font-family:inherit;font-weight:800;color:var(--ink);transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
html.dark .pg-nav button{color:var(--head)}
.pg-nav button:hover:not(:disabled){background:var(--gold-soft);border-color:var(--gold)}
.pg-nav button:disabled{opacity:.4;cursor:not-allowed}.pg-nav button svg{width:15px;height:15px}
#pgLabel{font-weight:800;color:var(--tx2);font-size:13.5px;min-width:96px;text-align:center}
.qr-loading{text-align:center;padding:50px 20px;color:var(--tx2)}
.qr-loading .spin{width:34px;height:34px;margin:0 auto 14px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sheet-scrim{position:fixed;inset:0;background:rgba(8,25,31,.5);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.3s;z-index:400}
.sheet-scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:401;max-width:560px;margin:0 auto;background:var(--paper);border-radius:22px 22px 0 0;border:1px solid var(--line);border-bottom:none;box-shadow:0 -20px 50px -20px rgba(8,25,31,.5);transform:translateY(102%);transition:transform .34s var(--ease);max-height:84vh;display:flex;flex-direction:column}
.sheet.show{transform:none}
.sheet-grip{width:42px;height:5px;border-radius:5px;background:var(--line);margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:6px 20px 12px;border-bottom:1px solid var(--line)}
.sheet-head b{font-family:'Reem Kufi',serif;font-size:16px;color:var(--ink)}
html.dark .sheet-head b{color:var(--head)}
.sheet-x{width:34px;height:34px;border:none;background:var(--paper2);border-radius:50%;cursor:pointer;color:var(--tx2);font-size:16px}
.sheet-body{padding:16px 20px 26px;overflow-y:auto}
.sheet-verse{font-family:'AmiriQuranEmbed','Amiri Quran','Amiri',serif;font-size:25px;line-height:2.1;text-align:center;color:var(--tx);background:var(--gold-soft);border-radius:14px;padding:16px;margin-bottom:14px}
.sheet-acts{display:grid;grid-template-columns:repeat(auto-fit,minmax(74px,1fr));gap:8px;margin-bottom:14px}
.sheet-acts button{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;border:1px solid var(--line);background:transparent;border-radius:14px;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--tx2);transition:.2s}
.sheet-acts button:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-soft)}.sheet-acts svg{width:20px;height:20px}
.taf-pick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.taf-pick button{padding:7px 13px;border-radius:30px;border:1px solid var(--line);background:transparent;cursor:pointer;font-family:inherit;font-weight:700;font-size:12.5px;color:var(--tx2)}
.taf-pick button.on{color:#fff;background:linear-gradient(135deg,var(--gold),var(--gold-d));border-color:transparent}
.taf-text{font-family:'Amiri',serif;font-size:18px;line-height:2;color:var(--tx);white-space:pre-wrap;min-height:24px}
.tgl.glow{border-color:var(--gold);color:var(--gold-d);animation:tajglow 2.2s ease-in-out infinite}
@keyframes tajglow{0%,100%{box-shadow:0 0 0 0 rgba(201,162,75,0)}50%{box-shadow:0 0 15px 1px rgba(201,162,75,.65)}}
.tgl.glow.on{animation:none}
.range-box{margin-top:8px;padding:14px;border-radius:14px;background:var(--paper2)}
.rb-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.rb-row:last-child{margin-bottom:0}
.rb-row label{font-size:13px;color:var(--tx2);font-weight:700}
.rb-row select{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:var(--paper);color:var(--tx);font-family:inherit;font-weight:700}
.rep-chips{display:flex;gap:5px;flex-wrap:wrap}
.rep-chips button{min-width:38px;height:34px;padding:0 8px;border-radius:9px;border:1px solid var(--line);background:transparent;cursor:pointer;font-family:inherit;font-weight:800;color:var(--tx2)}
.rep-chips button.on{color:#fff;background:linear-gradient(135deg,var(--teal),var(--teal-d));border-color:transparent}
.rb-play{margin-inline-start:auto;padding:10px 18px;border-radius:30px;border:none;cursor:pointer;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--gold),var(--gold-d));font-family:inherit}
.page-card.madani{background:linear-gradient(180deg,#fbf4e3,#f6ecd2);box-shadow:0 30px 70px -34px rgba(12,42,51,.5),inset 0 0 0 3px var(--gold),inset 0 0 0 9px rgba(201,162,75,.16)}
html.dark .page-card.madani{background:linear-gradient(180deg,#13312b,#0e2730)}
.page-card.madani .mushaf{line-height:2.7}
.page-card.madani .pc-medallion{display:inline-grid;place-items:center;width:48px;height:48px;margin:4px auto 0;border-radius:50%;border:2px solid var(--gold);color:var(--gold-d);font-weight:800;font-size:14px;background:radial-gradient(circle,var(--gold-soft),transparent 72%)}
@media(max-width:560px){.qv-bar{left:8px;right:8px}}
.qpage{max-width:790px;margin:14px auto 0;padding:34px clamp(16px,5vw,46px) 24px;border-radius:22px;background:linear-gradient(180deg,#fcf6e6,#f6ecd2);border:1px solid var(--gold-l);box-shadow:0 30px 70px -34px rgba(12,42,51,.5),inset 0 0 0 3px var(--gold),inset 0 0 0 9px rgba(201,162,75,.15);font-size:calc(1.72rem*var(--qfs,1));line-height:2.25;color:#211606;direction:rtl}
html.dark .qpage{background:linear-gradient(180deg,#13312b,#0e2730);color:var(--tx)}
.qline{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:nowrap;margin:0}
.qw{cursor:pointer;white-space:nowrap;border-radius:6px;transition:background .2s;padding:0 .015em}
.qw:hover{background:var(--gold-soft)}.qw.play{background:rgba(17,159,191,.22)}
.qsurah{text-align:center;font-family:'Reem Kufi',serif;color:var(--gold-d);margin:16px 0 2px;font-size:.6em;font-weight:700;border-top:1px solid rgba(201,162,75,.4);border-bottom:1px solid rgba(201,162,75,.4);padding:6px 0}
.qbasmala{text-align:center;color:var(--gold-d);font-family:'AmiriQuranEmbed','Amiri Quran',serif;margin:6px 0 10px;font-size:.74em}
.qv-bar{transition:transform .32s cubic-bezier(.22,.61,.36,1)}.qv-bar.hide{transform:translateY(-190%)!important}.page-card{animation:fadeUp .45s cubic-bezier(.22,.61,.36,1)}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.qpage4{max-width:840px;margin:14px auto 0;padding:34px clamp(14px,4vw,40px) 22px;border-radius:22px;background:linear-gradient(180deg,#fdf8ea,#f6ecd2);border:1px solid var(--gold-l);box-shadow:0 30px 70px -34px rgba(12,42,51,.5),inset 0 0 0 3px var(--gold),inset 0 0 0 9px rgba(201,162,75,.15);direction:rtl;animation:fadeUp .45s cubic-bezier(.22,.61,.36,1)}
html.dark .qpage4{background:linear-gradient(180deg,#13312b,#0e2730)}
.m-line{display:flex;flex-direction:row;direction:rtl;justify-content:center;align-items:center;width:100%;flex-wrap:nowrap;gap:0;line-height:1.95}
.m-word{display:inline-block;cursor:pointer;color:#1f1608;font-size:calc(var(--qfs,1)*clamp(1.05rem,4.7vw,1.72rem));transition:color .15s,background .15s;border-radius:4px;padding:0 .5px}
html.dark .m-word{color:var(--tx)}
.m-word:hover{color:var(--gold-d);background:var(--gold-soft)}
.m-word.type-surah_header{display:flex;justify-content:center;width:100%;color:var(--gold-d);margin:12px 0 4px;font-size:calc(var(--qfs,1)*clamp(1.35rem,5.6vw,2.15rem))}
.m-word.type-bismillah{display:flex;justify-content:center;width:100%;margin:6px 0 10px;color:#1f1608}
html.dark .m-word.type-bismillah{color:var(--tx)}
.m-word.type-end{color:var(--gold-d)}.m-word.type-quarter{color:var(--teal-d)}
.m-word.play{background:rgba(17,159,191,.22)!important;color:var(--teal-d)}
.qr-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 20px;color:var(--tx2);font-size:14px}
.spin{width:34px;height:34px;border:3px solid var(--gold-soft);border-top-color:var(--gold-d);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

#fsBtn{display:inline-flex;align-items:center;justify-content:center}#fsBtn svg{width:17px;height:17px;display:block}#fsBtn.on{background:var(--gold);color:#fff;border-color:var(--gold-d)}
body.qfs{overflow:hidden}
body.qfs #nav,body.qfs #qvBar,body.qfs .tj-legend,body.qfs .pg-nav{display:none!important}
body.qfs .qv{position:fixed!important;inset:0;z-index:9000;margin:0;padding:0;max-width:none;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(125% 90% at 50% -10%,var(--paper2),var(--paper))}
html.dark body.qfs .qv{background:radial-gradient(125% 90% at 50% -10%,#10303a,#0b1f27)}
body.qfs #pane{padding:60px 10px 48px!important;display:flex;justify-content:center;min-height:100%}
body.qfs .qpage4,body.qfs .page-card{margin-top:0;width:100%}
.qfs-bar{position:fixed;top:0;left:0;right:0;z-index:9200;display:none;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;direction:ltr;background:linear-gradient(180deg,rgba(251,246,236,.97) 32%,rgba(251,246,236,0));-webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);transition:transform .35s cubic-bezier(.22,.61,.36,1),opacity .35s}
html.dark .qfs-bar{background:linear-gradient(180deg,rgba(14,39,48,.97) 32%,rgba(14,39,48,0))}
body.qfs .qfs-bar{display:flex}
.qfs-bar.hide{transform:translateY(-110%);opacity:0;pointer-events:none}
.qfs-btn{display:inline-grid;place-items:center;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--paper);color:var(--ink);cursor:pointer;transition:background .2s,border-color .2s;flex:0 0 auto;font-family:'Reem Kufi',serif;font-weight:700;font-size:15px}
.qfs-btn:hover{background:var(--gold-soft);border-color:var(--gold)}
.qfs-btn svg{width:20px;height:20px}
.qfs-info{font-family:'Reem Kufi',serif;font-weight:700;color:var(--ink);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qfs-grp{display:flex;gap:6px;flex:0 0 auto}
.qfs-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:9200;width:48px;height:48px;border-radius:50%;display:none;place-items:center;background:rgba(251,246,236,.92);border:1px solid var(--line);color:var(--ink);cursor:pointer;transition:opacity .35s,background .2s,transform .2s;box-shadow:0 10px 26px -12px rgba(12,42,51,.55)}
html.dark .qfs-nav{background:rgba(14,39,48,.92)}
.qfs-nav svg{width:24px;height:24px}.qfs-nav:hover{background:var(--gold-soft)}
.qfs-nav.l{left:16px}.qfs-nav.r{right:16px}
.qfs-nav.hide{opacity:0;pointer-events:none}
@media(hover:hover) and (min-width:760px){body.qfs .qfs-nav{display:grid}}

(function(){try{var sk=JSON.parse(store.get('mh-skin')||'null');if(sk){var r=document.documentElement;for(var k in sk)r.style.setProperty(k,sk[k]);}}catch(e){}})();
(function(){if(store.get('mh-theme')==='dark')document.documentElement.classList.add('dark');

b.addEventListener('click',function(){document.documentElement.classList.toggle('dark');store.set('mh-theme',document.documentElement.classList.contains('dark')?'dark':'light');p();});
var tg=document.getElementById('navToggle'),nl=document.getElementById('navLinks');
tg.addEventListener('click',function(){tg.classList.toggle('open');nl.classList.toggle('open');});

var ex=document.getElementById('qfsExit');if(ex)ex.addEventListener('click',function(e){e.stopPropagation();exit();});
var nx=document.getElementById('qfsNext');if(nx)nx.addEventListener('click',function(e){e.stopPropagation();stopAudio();go(PG+1);info();show();});
var pv=document.getElementById('qfsPrev');if(pv)pv.addEventListener('click',function(e){e.stopPropagation();stopAudio();go(PG-1);info();show();});
var fm=document.getElementById('qfsFMinus');if(fm)fm.addEventListener('click',function(e){e.stopPropagation();var x=document.getElementById('fMinus');if(x)x.click();show();});
var fp=document.getElementById('qfsFPlus');if(fp)fp.addEventListener('click',function(e){e.stopPropagation();var x=document.getElementById('fPlus');if(x)x.click();show();});
['mousemove','touchstart','click'].forEach(function(ev){document.addEventListener(ev,function(){if(inFS())show();},{passive:true});});
function sync(){if(!(document.fullscreenElement||document.webkitFullscreenElement)&&inFS()){document.body.classList.remove('qfs');var b=document.getElementById('fsBtn');if(b)b.classList.remove('on');clearTimeout(T);}}
document.addEventListener('fullscreenchange',sync);document.addEventListener('webkitfullscreenchange',sync);
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&inFS()){exit();}else if((e.key==='f'||e.key==='F')&&!/INPUT|SELECT|TEXTAREA/.test((e.target&&e.target.tagName)||'')){toggle();}});
})();fillRec();paintTaj();paintMad();render();
function layoutBar(){var nav=document.getElementById('nav');var nh=nav?nav.offsetHeight:60;var bar=document.getElementById('qvBar');if(!bar)return;bar.style.top=(nh+8)+'px';var main=document.querySelector('.qv');if(main)main.style.paddingTop=(bar.offsetHeight+20)+'px';}window.addEventListener('resize',layoutBar);window.addEventListener('load',layoutBar);setTimeout(layoutBar,80);setTimeout(layoutBar,400);layoutBar();(function(){var lastY=0,hid=false;window.addEventListener('scroll',function(){var y=window.pageYOffset||document.documentElement.scrollTop||0;var bar=document.getElementById('qvBar');if(!bar)return;if(y>160&&y>lastY+12){if(!hid){bar.classList.add('hide');hid=true;}}else if(y<lastY-12||y<130){if(hid){bar.classList.remove('hide');hid=false;}}lastY=y;},{passive:true});})();
