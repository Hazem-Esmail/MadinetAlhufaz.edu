<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>الأذكار والأدعية — مدينة الحفّاظ</title>

<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Amiri+Quran&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Reem+Kufi:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;overflow-x:clip}
:root{--gold:#C9A24B;--gold-d:#9F7A28;--gold-l:#E6C97B;--gold-soft:#F6EDD4;--teal:#119FBF;--teal-d:#0B7E99;--teal-soft:#E2F6FB;--ink:#0C2A33;--ink2:#103C49;--paper:#FBF6EC;--paper2:#F4E9D3;--line:#E7D8B6;--tx:#1d2b30;--tx2:#5b6b70;--head:#16505F;--ease:cubic-bezier(.22,.61,.36,1);--g1:rgba(201,162,75,.55);--g2:rgba(17,159,191,.45);--g3:rgba(230,201,123,.45)}
html.dark{--paper:#08191f;--paper2:#0d2730;--line:#1d4450;--tx:#e2edef;--tx2:#9fb6bd;--head:#E6C97B;--gold-soft:rgba(201,162,75,.14);--teal-soft:rgba(17,159,191,.14)}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--paper);color:var(--tx);line-height:1.8;min-height:100vh;overflow-x:clip;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}::selection{background:var(--gold-soft)}
.bg-glows{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.bg-glows .g{position:absolute;border-radius:50%;filter:blur(74px);opacity:.4;will-change:transform}
.bg-glows .g1{width:46vw;height:46vw;background:radial-gradient(circle,var(--g1),transparent 68%);top:-9%;inset-inline-start:-6%;animation:gA 30s ease-in-out infinite}
.bg-glows .g2{width:42vw;height:42vw;background:radial-gradient(circle,var(--g2),transparent 68%);bottom:-12%;inset-inline-end:-8%;animation:gB 36s ease-in-out infinite}
.bg-glows .g3{width:34vw;height:34vw;background:radial-gradient(circle,var(--g3),transparent 70%);top:40%;inset-inline-start:44%;animation:gC 42s ease-in-out infinite}
@keyframes gA{0%,100%{transform:translate(0,0)}50%{transform:translate(6vw,7vh)}}
@keyframes gB{0%,100%{transform:translate(0,0)}50%{transform:translate(-7vw,-5vh)}}
@keyframes gC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vw,4vh) scale(1.12)}}
html.dark .bg-glows .g{opacity:.28}
/* frosted glass nav (always visible) */
#nav{position:sticky;top:0;z-index:300;background:rgba(251,246,236,.9);-webkit-backdrop-filter:blur(20px) saturate(1.6);backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid rgba(201,162,75,.22);box-shadow:0 6px 26px -18px rgba(12,42,51,.55)}
html.dark #nav{background:rgba(8,25,31,.9)}
#nav::before{content:"";position:absolute;inset:0 0 auto 0;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.32),transparent);pointer-events:none}
html.dark #nav::before{background:linear-gradient(180deg,rgba(255,255,255,.06),transparent)}
#nav::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,75,.55),transparent);pointer-events:none}
.nav-in{max-width:1180px;margin:0 auto;padding:9px 18px;display:flex;align-items:center;gap:12px;position:relative}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand img{width:46px;height:46px;border-radius:50%;box-shadow:0 4px 12px -5px rgba(159,122,40,.6);flex-shrink:0}
.brand-txt{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.brand .b1{font-family:'Reem Kufi',serif;font-weight:700;font-size:15.5px;color:var(--ink);white-space:nowrap}
.brand .b2{font-size:11px;color:var(--gold-d);font-weight:600;white-space:nowrap}
html.dark .brand .b1{color:var(--head)}
.nav-links{margin-inline-start:auto;display:flex;align-items:center;gap:6px}
.nav-links a{padding:8px 14px;border-radius:30px;font-weight:700;font-size:14px;color:var(--tx2);transition:.25s}
.nav-links a:hover{color:var(--ink);background:var(--gold-soft)}
html.dark .nav-links a:hover{color:var(--head)}
.nav-links a.active{color:#fff;background:linear-gradient(135deg,var(--gold),var(--gold-d));box-shadow:0 8px 18px -10px rgba(159,122,40,.9)}
.theme-btn{width:40px;height:40px;border:1px solid var(--line);background:transparent;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:var(--tx2);transition:.25s;flex-shrink:0}
.theme-btn:hover{color:var(--gold-d);border-color:var(--gold)}.theme-btn svg{width:19px;height:19px}
.nav-toggle{display:none;margin-inline-start:auto;width:42px;height:42px;border:1px solid var(--line);background:transparent;border-radius:12px;cursor:pointer;color:var(--tx2);flex-direction:column;gap:4px;align-items:center;justify-content:center;flex-shrink:0}
.nav-toggle span{display:block;width:18px;height:2px;background:currentColor;border-radius:2px;transition:.3s}
.nav-toggle.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.nav-toggle.open span:nth-child(2){opacity:0}
.nav-toggle.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
@media(max-width:820px){.nav-toggle{display:flex}
.nav-links{position:fixed;inset:64px 0 auto 0;flex-direction:column;align-items:stretch;gap:4px;padding:14px 18px 20px;background:rgba(251,246,236,.98);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);transform:translateY(-12px);opacity:0;pointer-events:none;transition:.3s var(--ease);margin:0}
html.dark .nav-links{background:rgba(8,25,31,.99)}
.nav-links.open{transform:none;opacity:1;pointer-events:auto}
.nav-links a{padding:13px 14px}.nav-links .theme-btn{align-self:flex-start;margin-top:6px}}
@media(max-width:480px){.brand .b2{display:none}.brand img{width:40px;height:40px}.brand .b1{font-size:13.5px;white-space:normal}}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px;width:100%}
.page-head{text-align:center;padding:40px 0 6px}
.eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--gold-d);background:var(--gold-soft);border:1px solid var(--gold-l);padding:6px 16px;border-radius:30px}
html.dark .eyebrow{color:var(--gold-l)}
.page-head h1{font-family:'Reem Kufi',serif;font-size:clamp(27px,5vw,38px);color:var(--ink);margin-top:13px;line-height:1.3}
html.dark .page-head h1{color:var(--head)}
.ph-sub{color:var(--tx2);margin-top:8px;font-size:14px;max-width:600px;margin-inline:auto}
.card{background:rgba(255,255,255,.5);-webkit-backdrop-filter:blur(12px) saturate(1.25);backdrop-filter:blur(12px) saturate(1.25);border:1px solid rgba(231,216,182,.8);border-radius:18px}
html.dark .card{background:rgba(14,39,48,.5)}
footer.ft{margin-top:56px;padding:28px 18px;text-align:center;color:var(--tx2);font-size:13px;border-top:1px solid var(--line)}
footer.ft a{color:var(--gold-d);font-weight:700}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 22px;border-radius:30px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:.3s;z-index:600;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%)}
@media(max-width:760px){.bg-glows .g{filter:blur(52px);opacity:.34}.bg-glows .g3{display:none}}
@media(prefers-reduced-motion:reduce){.bg-glows .g{animation:none}*{scroll-behavior:auto!important}}

.az{padding-bottom:24px;max-width:100%}
.az-search{max-width:420px;margin:18px auto 14px}
.az-search input{width:100%;padding:12px 18px;border-radius:30px;border:1px solid var(--line);background:var(--paper);color:var(--tx);font-family:inherit;font-size:14px}
.az-search input:focus{outline:none;border-color:var(--gold)}
.cats{display:flex;gap:8px;overflow-x:auto;padding:6px 2px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
@media(min-width:760px){.cats{flex-wrap:wrap;justify-content:center;overflow:visible}}
.cat{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:30px;border:1px solid var(--line);background:transparent;cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px;color:var(--tx2);transition:.2s}
.cat svg{width:15px;height:15px}.cat:hover{background:var(--gold-soft);color:var(--gold-d)}
.cat.active{color:#fff;background:linear-gradient(135deg,var(--gold),var(--gold-d));border-color:transparent;box-shadow:0 8px 18px -10px rgba(159,122,40,.9)}
.az-prog{max-width:520px;margin:6px auto 22px;display:flex;align-items:center;gap:12px}
.az-prog .bar{flex:1;height:9px;border-radius:30px;background:var(--paper2);overflow:hidden}
.az-prog .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .4s var(--ease)}
.az-prog .pct{font-weight:800;color:var(--gold-d);font-size:13px;min-width:42px;text-align:center}
.az-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,440px),1fr));gap:18px;width:100%;max-width:940px;margin:0 auto}
.dhikr{position:relative;padding:26px 24px 20px;border-radius:22px;overflow:hidden;background:rgba(255,255,255,.55);-webkit-backdrop-filter:blur(12px) saturate(1.2);backdrop-filter:blur(12px) saturate(1.2);border:1px solid rgba(231,216,182,.75);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .3s}
html.dark .dhikr{background:rgba(14,39,48,.5)}
.dhikr:active{transform:scale(.985)}
.dhikr::before{content:"";position:absolute;top:0;bottom:0;inset-inline-start:0;width:4px;background:linear-gradient(var(--teal),var(--gold))}
.dhikr.done{box-shadow:0 0 0 1.6px #2faa6a inset;background:rgba(47,170,106,.07)}
.dhikr.done::before{background:#2faa6a}
.ripple{position:absolute;border-radius:50%;background:rgba(201,162,75,.35);transform:translate(-50%,-50%) scale(0);pointer-events:none;animation:rip .55s ease-out}
@keyframes rip{to{transform:translate(-50%,-50%) scale(1);opacity:0}}
.d-note{font-size:12px;font-weight:700;color:var(--teal-d);background:var(--teal-soft);padding:6px 14px;border-radius:30px;display:block;width:-moz-fit-content;width:fit-content;margin:0 auto 16px}
.d-txt{font-family:'Amiri Quran','Amiri',serif;font-size:24px;line-height:2.35;color:var(--tx);text-align:center;margin:2px 0 4px}
.d-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:20px;padding-top:16px;border-top:1px dashed var(--line)}
.d-info{display:flex;flex-direction:column;gap:5px;align-items:flex-start}
.d-info b{font-weight:800;color:var(--tx);font-size:15px}
.d-rep{font-size:12px;color:var(--gold-d);font-weight:700}
.rst{background:none;border:none;color:var(--tx2);cursor:pointer;font-family:inherit;font-size:12px;text-decoration:underline;padding:0;margin-top:2px;align-self:flex-start}
.d-ring{position:relative;width:66px;height:66px;flex-shrink:0;pointer-events:none}
.d-ring svg{width:66px;height:66px;transform:rotate(-90deg)}
.d-ring .rb{fill:none;stroke:var(--paper2);stroke-width:5}
.d-ring .rf{fill:none;stroke:url(#ag);stroke-width:5;stroke-linecap:round;stroke-dasharray:175.93;transition:stroke-dashoffset .35s var(--ease)}
.d-rem{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:21px;color:var(--gold-d)}
.d-ring.done .rf{stroke:#2faa6a}.d-ring.done .d-rem{color:#2faa6a;font-size:26px}
.az-actions{text-align:center;margin:26px 0 0}
.az-reset{padding:11px 24px;border-radius:30px;border:1px solid var(--line);background:transparent;cursor:pointer;font-family:inherit;font-weight:700;color:var(--tx2)}
.az-reset:hover{border-color:#c0532f;color:#c0532f}
</style>
</head>
<body>
<div class="bg-glows" aria-hidden="true"><span class="g g1"></span><span class="g g2"></span><span class="g g3"></span></div>
<header id="nav"><div class="nav-in"><a class="brand" href="index.html#hero"><img src="logo.png" alt="أكاديمية مدينة الحفاظ"><span class="brand-txt"><span class="b1">أكاديمية مدينة الحفاظ</span><span class="b2">للقرآن الكريم وعلومه</span></span></a><button class="nav-toggle" id="navToggle" aria-label="القائمة"><span></span><span></span><span></span></button><nav class="nav-links" id="navLinks"><a href="index.html#hero">الرئيسية</a><a href="quran.html">القرآن الكريم</a><a href="adhkar.html" class="active">الأذكار</a><a href="tasbih.html">المسبحة</a><button class="theme-btn" id="themeBtn" aria-label="تبديل الوضع"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button></nav></div></header>
<main class="wrap az">
  <div class="page-head"><span class="eyebrow">حصن المسلم</span><h1>الأذكار والأدعية</h1><p class="ph-sub">اضغط على أي مكان في البطاقة لتسبيح الذِّكر وعدّه حتى يكتمل</p></div>
  <svg width="0" height="0" style="position:absolute"><defs><linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#119FBF"/><stop offset="1" stop-color="#C9A24B"/></linearGradient></defs></svg>
  <div class="az-search"><input id="azSearch" type="search" placeholder="ابحث في الأذكار..."></div>
  <div class="cats" id="cats"></div>
  <div class="az-prog"><div class="bar"><i id="azBar"></i></div><span class="pct" id="azPct">٠٪</span></div>
  <div class="az-grid" id="azGrid"></div>
  <div class="az-actions"><button class="az-reset" id="azReset">إعادة تعيين هذه المجموعة</button></div>
</main>
<div class="toast" id="toast"></div>
<footer class="ft">أكاديمية مدينة الحفاظ للقرآن الكريم وعلومه — <a href="index.html#hero">العودة للرئيسية</a></footer>
<script>
var store={get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}}};
(function(){try{var sk=JSON.parse(store.get('mh-skin')||'null');if(sk){var r=document.documentElement;for(var k in sk)r.style.setProperty(k,sk[k]);}}catch(e){}})();
(function(){if(store.get('mh-theme')==='dark')document.documentElement.classList.add('dark');
var b=document.getElementById('themeBtn');function p(){b.innerHTML=document.documentElement.classList.contains('dark')?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1.5v2M12 20.5v2M4.2 4.2l1.5 1.5M18.3 18.3l1.5 1.5M1.5 12h2M20.5 12h2M4.2 19.8l1.5-1.5M18.3 5.7l1.5-1.5"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}p();
b.addEventListener('click',function(){document.documentElement.classList.toggle('dark');store.set('mh-theme',document.documentElement.classList.contains('dark')?'dark':'light');p();});
var tg=document.getElementById('navToggle'),nl=document.getElementById('navLinks');
tg.addEventListener('click',function(){tg.classList.toggle('open');nl.classList.toggle('open');});
nl.addEventListener('click',function(e){if(e.target.tagName==='A'){tg.classList.remove('open');nl.classList.remove('open');}});})();
function ar(n){return String(n).replace(/[0-9]/g,function(d){return '٠١٢٣٤٥٦٧٨٩'[+d]});}

var ICN={"الصباح":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"13\" r=\"4\"/><path d=\"M12 4v2M5 13H3M21 13h-2M6 7l1.5 1.5M18 7l-1.5 1.5M2 19h20\"/></svg>","المساء":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M20 14a8 8 0 1 1-9.9-9.7A6 6 0 0 0 20 14z\"/></svg>","بعد الصلاة":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M12 3v7M8 21l4-6 4 6M5 10h14\"/></svg>","الاستيقاظ":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"13\" r=\"5\"/><path d=\"M12 2v3M3 6l2 1M21 6l-2 1\"/></svg>","النوم":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M3 12h6l-3 4h6M14 6h7l-4 5h4\"/></svg>","المنزل":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 11l8-6 8 6M6 10v9h12v-9\"/></svg>","الطعام":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M5 3v8M8 3v8M6.5 11v10M16 3c-2 0-3 2-3 5s1 4 3 4v9\"/></svg>","الكرب والهمّ":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M12 21s-7-4.5-9-9a4.5 4.5 0 0 1 8-3 4.5 4.5 0 0 1 8 3c-1.2 2.7-3.6 5.2-7 9z\"/></svg>","تسابيح واستغفار":"<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><circle cx=\"5\" cy=\"12\" r=\"2\"/><circle cx=\"12\" cy=\"12\" r=\"2\"/><circle cx=\"19\" cy=\"12\" r=\"2\"/><path d=\"M3 7c4-3 14-3 18 0\"/></svg>"};var AZ={"الصباح": [{"n": 1, "t": "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ، لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ، لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ، مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ، يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ، وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ، وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ، وَلَا يَئُودُهُ حِفْظُهُمَا، وَهُوَ الْعَلِيُّ الْعَظِيمُ", "r": "آية الكرسي"}, {"n": 3, "t": "قُلْ هُوَ اللَّهُ أَحَدٌ… • قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ… • قُلْ أَعُوذُ بِرَبِّ النَّاسِ…", "r": "المعوذات"}, {"n": 1, "t": "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ"}, {"n": 1, "t": "اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ"}, {"n": 1, "t": "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ", "r": "سيد الاستغفار"}, {"n": 4, "t": "اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ وَأُشْهِدُ حَمَلَةَ عَرْشِكَ وَمَلَائِكَتَكَ وَجَمِيعَ خَلْقِكَ أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلَّا أَنْتَ وَحْدَكَ لَا شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ"}, {"n": 3, "t": "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ ﷺ نَبِيًّا"}, {"n": 3, "t": "اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ"}, {"n": 7, "t": "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ، عَلَيْهِ تَوَكَّلْتُ، وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ"}, {"n": 3, "t": "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ، وَهُوَ السَّمِيعُ الْعَلِيمُ"}, {"n": 100, "t": "س var cats=Object.keys(AZ),cur=cats[0],counts={};
try{counts=JSON.parse(store.get('az-counts')||'{}')}catch(e){counts={}}
function save(){store.set('az-counts',JSON.stringify(counts));}
var catsEl=document.getElementById('cats'),grid=document.getElementById('azGrid'),bar=document.getElementById('azBar'),pct=document.getElementById('azPct'),search=document.getElementById('azSearch');
cats.forEach(function(k){var b=document.createElement('button');b.className='cat'+(k===cur?' active':'');b.innerHTML=(ICN[k]||'')+'<span>'+k+'</span>';b.onclick=function(){cur=k;search.value='';[].forEach.call(catsEl.children,function(c){c.classList.toggle('active',c.querySelector('span').textContent===k)});render();};catsEl.appendChild(b);});
function key(i){return cur+'#'+i;}
function ripple(card,e){var r=card.getBoundingClientRect();var x=(e.clientX||r.left+r.width/2)-r.left,y=(e.clientY||r.top+r.height/2)-r.top;var d=Math.max(r.width,r.height)*1.4;var s=document.createElement('span');s.className='ripple';s.style.left=x+'px';s.style.top=y+'px';s.style.width=s.style.height=d+'px';card.appendChild(s);setTimeout(function(){s.remove();},560);}
function render(){grid.innerHTML='';var q=search.value.trim();var items=AZ[cur];
 items.forEach(function(it,ci){if(q&&it.t.indexOf(q)<0&&!(it.r&&it.r.indexOf(q)>-1))return;
  var c=counts[key(ci)]||0,done=c>=it.n,rem=Math.max(it.n-c,0),off=175.93*(1-Math.min(c/it.n,1));
  var card=document.createElement('div');card.className='dhikr'+(done?' done':'');
  card.innerHTML=(it.r?'<span class="d-note">'+it.r+'</span>':'')+'<div class="d-txt">'+it.t+'</div>'+
   '<div class="d-foot"><div class="d-info"><b>'+ar(c)+' / '+ar(it.n)+'</b><span class="d-rep">التكرار: '+ar(it.n)+'</span>'+(c>0?'<button class="rst">تصفير</button>':'')+'</div>'+
   '<div class="d-ring'+(done?' done':'')+'"><svg viewBox="0 0 66 66"><circle class="rb" cx="33" cy="33" r="28"/><circle class="rf" cx="33" cy="33" r="28" style="stroke-dashoffset:'+off+'"/></svg><span class="d-rem">'+(done?'✓':ar(rem))+'</span></div></div>';
  card.addEventListener('click',function(e){if(e.target.classList.contains('rst'))return;ripple(card,e);tap(ci);});
  var rb=card.querySelector('.rst');if(rb)rb.addEventListener('click',function(e){e.stopPropagation();counts[key(ci)]=0;save();render();});
  grid.appendChild(card);});
 var done=0;items.forEach(function(_,ci){if((counts[key(ci)]||0)>=items[ci].n)done++;});

function tap(ci){var it=AZ[cur][ci],c=counts[key(ci)]||0;counts[key(ci)]=(c>=it.n)?0:c+1;if(navigator.vibrate)navigator.vibrate(counts[key(ci)]>=it.n?55:16);save();render();}

document.getElementById('azReset').addEventListener('click',function(){AZ[cur].forEach(function(_,ci){counts[key(ci)]=0;});save();render();});
